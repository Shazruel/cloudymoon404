<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudmoon Mirror</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe 
        src="https://cloudmoonapp.pages.dev/" 
        id="mirrorFrame"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-presentation"
        allowfullscreen>
    </iframe>

    <script>
        // This script attempts to prevent the "Top" window from being redirected
        window.onbeforeunload = function() {
            return "Are you sure you want to leave this page?";
        };
    </script>
</body>
</html>
