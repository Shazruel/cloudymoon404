<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudmoon Mirror</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        #wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="wrapper">
        <iframe 
            src="https://cloudmoonapp.pages.dev/" 
            id="mirrorFrame"
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // This blocks the app from trying to force-open a new window to the main site
        const frame = document.getElementById('mirrorFrame');
        
        // Trap the 'beforeunload' to prevent the main tab from redirecting
        window.onbeforeunload = function() {
            return "Preventing redirect to blocked site...";
        };
    </script>
</body>
</html>
